<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <radialGradient id="petal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE4EF"/>
      <stop offset="100%" stop-color="#F4A8C8"/>
    </radialGradient>
    <radialGradient id="petal2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EEE0FA"/>
      <stop offset="100%" stop-color="#C7A8E8"/>
    </radialGradient>
    <radialGradient id="centerg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF4A8"/>
      <stop offset="100%" stop-color="#F4C84A"/>
    </radialGradient>
  </defs>

  <!-- Warm off-white background matching the site bg-alt token -->
  <rect width="1200" height="630" fill="#FAF7F4"/>

  <!-- Soft pink accent washes -->
  <circle cx="1050" cy="540" r="280" fill="#F9DEE5" opacity="0.6"/>
  <circle cx="180" cy="120" r="160" fill="#FDF1F4" opacity="0.85"/>

  <!-- Brand flower mark (from logo-mark.svg) scaled up and centred -->
  <g transform="translate(600 200) scale(1.7)">
    <ellipse cx="0" cy="-14" rx="9" ry="13" fill="url(#petal)"/>
    <ellipse cx="13.3" cy="-4.3" rx="9" ry="13" fill="url(#petal2)" transform="rotate(72 13.3 -4.3)"/>
    <ellipse cx="8.2" cy="11.3" rx="9" ry="13" fill="url(#petal)" transform="rotate(144 8.2 11.3)"/>
    <ellipse cx="-8.2" cy="11.3" rx="9" ry="13" fill="url(#petal2)" transform="rotate(216 -8.2 11.3)"/>
    <ellipse cx="-13.3" cy="-4.3" rx="9" ry="13" fill="url(#petal)" transform="rotate(288 -13.3 -4.3)"/>
    <circle cx="0" cy="0" r="5.5" fill="url(#centerg)"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="370"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="104"
        font-weight="600"
        letter-spacing="-3"
        fill="#1A1A1A">Soft Florals</text>

  <!-- Subtitle -->
  <text x="600" y="436"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="30"
        font-weight="400"
        letter-spacing="-0.2"
        fill="#5A5A5A">Handmade Forever Flowers</text>

  <!-- Tagline pill (rect already centred around x=600) -->
  <rect x="380" y="484" width="440" height="44" rx="22"
        fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5" opacity="0.9"/>
  <text x="600" y="512"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="15"
        font-weight="500"
        letter-spacing="2.4"
        fill="#1A1A1A">TWISTED BY HAND · SHIPS WORLDWIDE</text>
</svg>
